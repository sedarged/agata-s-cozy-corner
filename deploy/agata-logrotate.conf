# /etc/logrotate.d/agata — log rotation for the Agata app.
#
# Agata runs under systemd, which writes its stdout/stderr to the
# systemd journal. We don't need an external log file for the app
# itself — `journalctl -u agata -f` is the canonical stream.
#
# This file exists so the *web server logs* (Caddy access/error) get
# rotated before they fill the disk. Caddy's default log dir is
# /var/log/caddy; without rotation it grows without bound.
#
# Install:
#   sudo cp deploy/agata-logrotate.conf /etc/logrotate.d/agata
#   sudo systemctl restart logrotate.timer   # if the timer is not running

/var/log/caddy/*.log {
    # Daily rotation keeps the journal searchable for ~1 day of Caddy
    # errors before they get compressed.
    daily
    # Keep 14 days of compressed logs. 7 is too aggressive — when
    # triaging a slow leak you want at least two weeks of history.
    rotate 14
    # Compress with gzip — saves ~90% of disk for plain access logs.
    compress
    compresscmd /usr/bin/gzip
    # Don't compress the most recent file — Caddy is still writing.
    delaycompress
    # Caddy's logs are append-only and survive rotation; no need to
    # signal anything. But we send a USR1 to be safe in case a future
    # Caddy build reopens the file handle.
    postrotate
        systemctl reload caddy >/dev/null 2>&1 || true
    endscript
    # Don't rotate empty logs.
    notifempty
    # If the disk is nearly full, drop older rotations immediately.
    maxage 30
    # Don't break Caddy mid-request if the rotation races.
    copytruncate
    # Sanity-check ownership — logrotate runs as root.
    su root root
    create 0640 caddy caddy
}

/var/log/agata/*.log {
    # If you ever switch Agata to write to a file (instead of relying
    # purely on journald), this block keeps those files in check.
    # Today it's a no-op — the directory is empty.
    daily
    rotate 7
    compress
    delaycompress
    notifempty
    missingok
    copytruncate
    su agata agata
}