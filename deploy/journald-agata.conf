# /etc/systemd/journald.conf.d/agata.conf — journald limits so Agata
# can't fill the disk with logs.
#
# Why this exists:
#   - The Agata app logs to journald (per the systemd unit).
#   - Gigi (the AI assistant) is chatty: every streaming token can produce
#     a log line. Under load, a single user having a long conversation
#     could push the journal past 4 GB.
#   - Default journald caps at 4 GB or 15% filesystem, whichever is
#     smaller. On a 20 GB VPS that's only 3 GB of headroom.
#
# This file caps journal size at 500 MB with 7 days of retention — more
# than enough to triage any real bug, while keeping the disk honest.
#
# Install:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp deploy/journald-agata.conf /etc/systemd/journald.conf.d/agata.conf
#   sudo systemctl restart systemd-journald
#
# Verify:
#   journalctl --disk-usage
#
# Notes:
#   - RateLimitIntervalSec / RateLimitBurst throttle chatty services.
#     10000 events / 30 s = ~333 msgs/sec sustained, which is enough
#     for normal app logs but caps a runaway Gigi stream.
#   - SystemMaxUse wins over individual service caps. The 500 MB cap
#     here is global, so other services share it too.

[Journal]
# Cap journal size at 500 MB. Smaller VPSes (20 GB disk) need this;
# bigger ones can raise it.
SystemMaxUse=500M
# Always keep the last 7 days, even if the size cap would otherwise
# evict them sooner. This guarantees you can look at "what broke on
# Monday" all week.
MaxRetentionSec=7day
# Per-file cap. Default is 1/8 of SystemMaxUse; tighten it so a single
# giant log file can't take over the whole budget.
SystemMaxFileSize=50M
# Throttle chatty services (Gigi streaming, etc.). 10 000 events per
# 30 s = ~333/s sustained.
RateLimitIntervalSec=30s
RateLimitBurst=10000
# Forward to syslog only if you're already running one (most VPSes
# don't bother). Off = journald stores everything locally.
ForwardToSyslog=no
ForwardToWall=no
# Don't compress — small journals aren't worth the CPU.
Compress=no